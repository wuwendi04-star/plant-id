name: PlantID
options:
  bundleIdPrefix: com.plantid
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  PlantID:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PlantID
    resources:
      - path: PlantID/Resources
    locales:
      - en
      - zh-Hans
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plantid.PlantID
        INFOPLIST_FILE: PlantID/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: PlantID/PlantID.entitlements
      properties:
        com.apple.developer.nfc.readersession.formats:
          - NDEF
    dependencies: []

  PlantIDTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PlantIDTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plantid.PlantIDTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PlantID

  PlantIDUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PlantIDUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plantid.PlantIDUITests
        TEST_TARGET_NAME: PlantID
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PlantID
